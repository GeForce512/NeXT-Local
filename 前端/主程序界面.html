<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXT AI - 下一代工作台</title>
    <link rel="stylesheet" href="界面样式.css">
</head>
<body>
    <button id="home-btn" title="返回主页">←</button>

    <div id="dock">
        <div class="dock-item active" data-page="env"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"></rect><line x1="8" y1="21" x2="16" y2="21"></line><line x1="12" y1="17" x2="12" y2="21"></line></svg></div>
        <div class="dock-item" data-page="download"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg></div>
        <div class="dock-item" data-page="data"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline></svg></div>
        <div class="dock-item" data-page="train"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="4" y1="21" x2="4" y2="14"></line><line x1="4" y1="10" x2="4" y2="3"></line><line x1="12" y1="21" x2="12" y2="12"></line><line x1="12" y1="8" x2="12" y2="3"></line></svg></div>
        <div class="dock-item" data-page="chat"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg></div>
        <div class="dock-item" data-page="data-management"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg></div>
    </div>

    <div id="main-content">
        <div class="content-header">
            <h1 id="page-title">环境监测</h1>
            <button id="theme-toggle-btn" class="theme-toggle-btn" title="切换明暗模式">
                <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
                <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
            </button>
        </div>

        <!-- 1. 环境监测 -->
        <div class="page-container active" id="env-content">
            <div class="card"><div class="card-title"><span>运行环境检查</span></div><div class="module"><button class="btn btn-primary" id="env-btn">开始检测</button></div></div>
            <div class="card"><div class="log-box" id="env-log">等待检测...</div></div>
        </div>

        <!-- 2. 模型获取 -->
        <div class="page-container" id="download-content">
            <div class="card">
                <div class="card-title"><span>模型获取</span></div>
                <div class="module">
                    <select class="form-select" id="model-select">
                        <option value="Qwen3.5-0.8B">Qwen3.5-0.8B (轻量模型)</option>
                        <option value="Qwen3.5-4B" selected>Qwen3.5-4B (基础模型)</option>
                    </select>
                    <button class="btn btn-primary" id="download-btn" style="margin-top:12px">开始下载</button>
                </div>
            </div>
            <div class="card"><div class="log-box" id="download-log">等待下载...</div></div>
        </div>

        <!-- 3. 数据准备 -->
        <div class="page-container" id="data-content">
            <div class="card">
                <div class="card-title"><span>数据集管理</span></div>
                <div id="drop-zone" class="drop-zone">
                    <svg class="drop-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                    <p class="drop-text">拖拽 JSONL / TXT / CSV 到此处，或 <span class="drop-highlight">点击上传</span></p>
                    <input type="file" id="file-input" multiple accept=".jsonl,.txt,.csv" style="display: none;">
                </div>
                <div id="dataset-grid" class="card-grid"><div class="empty-state" id="dataset-empty"><p>暂无数据集，请上传文件</p></div></div>
            </div>
            <div class="card"><div class="log-box" id="data-log">等待操作...</div></div>
        </div>

        <!-- 4. 模型微调 -->
        <div class="page-container" id="train-content">
            <div class="card">
                <div class="card-title"><span>训练配置</span></div>
                <div class="module">
                    <div class="form-group"><label class="form-label">LoRA 名称</label><input type="text" class="form-input" id="lora-name-input" placeholder="例如：medical_v1" /></div>
                    <div class="form-group">
                        <label class="form-label">训练模式</label>
                        <div class="radio-group">
                            <label class="radio-card active"><input type="radio" name="train-mode" value="new" checked><span class="radio-title">🚀 全新训练</span></label>
                            <label class="radio-card"><input type="radio" name="train-mode" value="continue"><span class="radio-title">🔄 增量训练</span></label>
                        </div>
                    </div>
                    <div class="form-group" id="base-lora-group" style="display: none;"><label class="form-label">基础 LoRA</label><select class="form-select" id="base-lora-select"></select></div>
                    <div class="form-group"><label class="form-label">训练数据集</label><select class="form-select" id="dataset-select"></select></div>
                    <button class="btn btn-primary" id="train-btn">开始训练</button>
                </div>
            </div>
            <div class="card"><div class="log-box" id="train-log">等待训练...</div></div>
        </div>

        <!-- 5. AI 对话 (★ 纯净版，无 Canvas) -->
        <div class="page-container" id="chat-content">
            <div class="chat-workspace-card">
                <aside id="chat-sidebar" class="chat-sidebar">
                    <div class="sidebar-header"><span>历史记录</span><button id="new-chat-btn" class="icon-btn" title="新对话">+</button></div>
                    <div id="history-list" class="history-list"></div>
                </aside>
                <main class="chat-main">
                    <div class="chat-top-bar">
                        <button id="sidebar-toggle" class="sidebar-toggle-btn" title="展开/折叠历史">☰</button>
                        <div id="lora-capsule" class="capsule">
                            <span id="capsule-text">🔴 模型未启动</span>
                            <svg class="capsule-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"></polyline></svg>
                            <div id="capsule-dropdown" class="capsule-dropdown"></div>
                        </div>
                    </div>
                    <div id="chat-messages" class="chat-messages"></div>
                    <div class="chat-bottom-bar">
                        <div id="magic-switches" class="magic-switches">
                            <div class="switch-pill" data-feature="thinking" title="深度思考 (CoT)">
                                <svg class="pill-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a8 8 0 0 0-8 8c0 3.4 2.1 6.3 5 7.5V20h6v-2.5c2.9-1.2 5-4.1 5-7.5a8 8 0 0 0-8-8z"/><path d="M10 22h4"/></svg>
                                <span class="pill-text">深度思考</span>
                            </div>
                        </div>
                        <div class="smart-input-area">
                            <input type="text" id="chat-input" class="chat-input" placeholder="输入消息..." disabled />
                            <button id="chat-send-btn" class="btn chat-send-btn" disabled>⚡ 发送</button>
                            <button id="chat-stop-btn" class="btn stop-btn" style="display: none;">停止</button>
                        </div>
                    </div>
                </main>
            </div>
        </div>

        <!-- 6. LoRA 权重管理 -->
        <div class="page-container" id="data-management-content">
            <div class="card">
                <div class="card-title"><span>LoRA 权重库</span></div>
                <div class="btn-group" style="margin-bottom: 16px;">
                    <button class="btn btn-primary" id="refresh-lora-btn">刷新</button>
                    <button class="btn btn-secondary" id="delete-lora-btn">删除选中</button>
                    <button class="btn btn-accent" id="switch-lora-btn">切换选中</button>
                </div>
                <div id="lora-grid" class="card-grid"><div class="empty-state" id="lora-empty"><p>暂无 LoRA 权重</p></div></div>
            </div>
            <div class="card"><div class="log-box" id="data-management-log">等待操作...</div></div>
        </div>
    </div>

    <div id="editor-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header"><h3 id="modal-title">编辑数据集</h3><button class="modal-close" id="modal-cancel-btn">×</button></div>
            <textarea id="modal-editor" class="modal-textarea"></textarea>
            <div class="modal-footer"><button class="btn btn-secondary" id="modal-delete-btn">删除</button><button class="btn btn-primary" id="modal-save-btn">保存</button></div>
        </div>
    </div>

    <script type="text/javascript" src="qrc:///qtwebchannel/qwebchannel.js"></script>
    <script type="text/javascript">
        new QWebChannel(qt.webChannelTransport, function(channel) {
            window.chatObject = channel.objects.chatObject;
        });
    </script>
    <script src="交互逻辑.js"></script>
</body>
</html>
